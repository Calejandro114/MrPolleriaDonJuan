<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pollería Don Juan</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- FontAwesome e Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Encabezado con Botón de Lupa e Inyección del Panel -->
  <header class="main-header">
    <div class="header-content">
      <h1>Pollería Don Juan</h1>
      <button id="toggle-search-btn" class="btn-icon" title="Buscar y Filtrar">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>
    <!-- Contenedor donde JS inyectará el buscador y los filtros -->
    <div id="search-filter-wrapper"></div>
  </header>

  <!-- Categorías -->
  <nav id="categories-container" class="categories-wrapper"></nav>

  <!-- Carrusel -->
  <section id="carousel-container"></section>

  <!-- Grilla de Productos -->
  <main>
    <div id="products-grid" class="products-grid"></div>
  </main>

  <!-- Contenedor para el Modal de Imagen -->
  <div id="modal-container"></div>

  <!-- Firebase Scripts y Módulo Principal -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
